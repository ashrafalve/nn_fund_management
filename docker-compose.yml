services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
      POSTGRES_DB: ${POSTGRES_DB:-odoo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  odoo:
    image: odoo:17.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      - HOST=${ODOO_DB_HOST:-db}
      - USER=${ODOO_DB_USER:-odoo}
      - PASSWORD=${ODOO_DB_PASSWORD:-odoo}
      - ODOO_ADDONS=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
    volumes:
      - ./addons:/mnt/extra-addons:ro
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
    ports:
      - "8069:8069"
    command: >
      odoo
      --db_host=${ODOO_DB_HOST:-db}
      --db_user=${ODOO_DB_USER:-odoo}
      --db_password=${ODOO_DB_PASSWORD:-odoo}
      --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
      --without-demo=all
      --log-level=info
      --proxy-mode
    restart: unless-stopped

volumes:
  postgres_data:
  odoo_filestore:
